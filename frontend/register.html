<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOCKLINE - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-bg-decor"></div>
    <div class="glass-panel auth-card ambient-shadow text-center">
      <h1 class="brand-logo gradient-text">STOCKLINE</h1>
      <p class="tagline mb-4">Create your account</p>
      
      <div id="alert-container"></div>

      <form id="registerForm" class="text-start">
        <div class="mb-3">
          <label class="input-label" for="name">Full Name</label>
          <input type="text" class="form-control" id="name" required placeholder="John Doe">
        </div>
        <div class="mb-3">
          <label class="input-label" for="email">Email Address</label>
          <input type="email" class="form-control" id="email" required placeholder="name@college.edu">
        </div>
        <div class="mb-3">
          <label class="input-label" for="role">Role</label>
          <select class="form-control bg-[#0b1121] text-white border-transparent focus:ring-[#10b981]" style="background-color: var(--surface-color); color: var(--text-primary); border-radius: var(--border-radius); padding: 0.75rem 1rem;" id="role" required>
            <option value="user">User</option>
            <option value="employee">Employee</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="input-label" for="password">Password</label>
                <div class="position-relative">
                  <input type="password" class="form-control pe-5" id="password" required
                    placeholder="Max 12 chars"
                    maxlength="12"
                    autocomplete="new-password"
                    oninput="updateStrength(this.value)">
                  <button type="button" class="btn p-0 position-absolute top-50 translate-middle-y end-0 me-2 text-muted" style="background:none;border:none;" onclick="togglePwd('password',this)" tabindex="-1">👁</button>
                </div>
                <div id="strength-bar" class="mt-2" style="height:3px;border-radius:2px;background:#222;"><div id="strength-fill" style="height:100%;width:0;border-radius:2px;transition:width .3s;"></div></div>
                <small id="strength-text" style="font-size:0.7rem;color:#6b7280;" class="d-block mt-1"></small>
            </div>
            <div class="col-md-6 mb-4">
                <label class="input-label" for="confirmPassword">Confirm Password</label>
                <div class="position-relative">
                  <input type="password" class="form-control pe-5" id="confirmPassword" required
                    placeholder="Repeat password"
                    maxlength="12"
                    autocomplete="new-password">
                  <button type="button" class="btn p-0 position-absolute top-50 translate-middle-y end-0 me-2 text-muted" style="background:none;border:none;" onclick="togglePwd('confirmPassword',this)" tabindex="-1">👁</button>
                </div>
            </div>
        </div>
        <p class="text-muted" style="font-size:0.72rem;margin-top:-0.5rem;margin-bottom:1rem;">Password: 8–12 chars, must include uppercase, number &amp; symbol</p>
        
        <button type="submit" class="btn btn-primary-custom w-100 mb-3 gradient-bg" id="registerBtn">Create Account</button>
      </form>
      
      <div class="mt-3 tagline">
        Already have an account? <a href="login.html" class="text-decoration-none fw-semibold" style="color: var(--surface-tint)">Sign In</a>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }
    function updateStrength(val) {
      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '0%',   c: '#ef4444', t: '' },
        { w: '25%',  c: '#ef4444', t: 'Weak — add uppercase, number or symbol' },
        { w: '50%',  c: '#f59e0b', t: 'Fair' },
        { w: '75%',  c: '#3b82f6', t: 'Good' },
        { w: '100%', c: '#10b981', t: 'Strong ✓' },
      ];
      const l = levels[score] || levels[0];
      fill.style.width = val.length ? l.w : '0%';
      fill.style.background = l.c;
      text.textContent = val.length ? l.t : '';
      text.style.color = l.c;
    }
    function validatePassword(val) {
      if (val.length < 8)  return 'Password must be at least 8 characters';
      if (val.length > 12) return 'Password must be at most 12 characters';
      if (!/[A-Z]/.test(val)) return 'Password must contain an uppercase letter';
      if (!/[0-9]/.test(val)) return 'Password must contain a number';
      if (!/[^A-Za-z0-9]/.test(val)) return 'Password must contain a symbol (e.g. @, #, !)';
      return null;
    }
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isAuthenticated()) {
        window.location.href = 'dashboard.html';
      }

      const form = document.getElementById('registerForm');
      const btn = document.getElementById('registerBtn');
      const alertContainer = document.getElementById('alert-container');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertContainer.innerHTML = '';
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const role = document.getElementById('role').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        const pwdError = validatePassword(password);
        if (pwdError) {
            alertContainer.innerHTML = buildAlertUI(pwdError, 'error');
            return;
        }

        if (password !== confirmPassword) {
            alertContainer.innerHTML = buildAlertUI('Passwords do not match', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Creating Account...';

        try {
          // const response = await fetchAPI('/auth/register', {
          //   method: 'POST',
          //   body: JSON.stringify({ name, email, role, password })
          // });
          
          await new Promise(r => setTimeout(r, 600)); // fake delay
          
          window.location.href = 'login.html';
        } catch (err) {
          alertContainer.innerHTML = buildAlertUI(err.message, 'error');
          btn.disabled = false;
          btn.innerHTML = 'Create Account';
        }
      });
    });
  </script>
</body>
</html>
