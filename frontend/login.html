<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOCKLINE - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-bg-decor"></div>
    <div class="glass-panel auth-card ambient-shadow text-center">
      <h1 class="brand-logo gradient-text">STOCKLINE</h1>
      <p class="tagline mb-4">Smart Stock. Zero Chaos.</p>
      
      <div id="alert-container"></div>

      <form id="loginForm" class="text-start">
        <div class="mb-3">
          <label class="input-label" for="email">Email Address</label>
          <input type="email" class="form-control" id="email" required placeholder="name@college.edu">
        </div>
        <div class="mb-4">
          <label class="input-label" for="password">Password</label>
          <div class="position-relative">
            <input type="password" class="form-control pe-5" id="password" required
              placeholder="Enter password"
              maxlength="12"
              autocomplete="current-password"
              oninput="updateStrengthMeter(this.value)">
            <button type="button" class="btn p-0 position-absolute top-50 translate-middle-y end-0 me-2 text-muted" style="background:none;border:none;" onclick="togglePwd('password',this)" tabindex="-1" aria-label="Show/hide password">👁</button>
          </div>
          <div id="strength-bar" class="mt-2" style="height:3px;border-radius:2px;transition:all .3s;background:#222;"><div id="strength-fill" style="height:100%;width:0;border-radius:2px;transition:width .3s;"></div></div>
          <small id="strength-text" class="text-muted d-block mt-1" style="font-size:0.7rem;"></small>
        </div>
        
        <button type="submit" class="btn btn-primary-custom w-100 mb-3 gradient-bg" id="loginBtn">Sign In</button>
      </form>
      
      <div class="mt-4 tagline">
        Don't have an account? <a href="register.html" class="text-decoration-none fw-semibold" style="color: var(--surface-tint)">Register here</a>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }
    function updateStrengthMeter(val) {
      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '0%',   c: '#ef4444', t: '' },
        { w: '25%',  c: '#ef4444', t: 'Weak' },
        { w: '50%',  c: '#f59e0b', t: 'Fair' },
        { w: '75%',  c: '#3b82f6', t: 'Good' },
        { w: '100%', c: '#10b981', t: 'Strong ✓' },
      ];
      const l = levels[score] || levels[0];
      fill.style.width = val.length ? l.w : '0%';
      fill.style.background = l.c;
      text.textContent = val.length ? l.t : '';
      text.style.color = l.c;
    }
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isAuthenticated()) {
        window.location.href = 'dashboard.html';
      }

      const form = document.getElementById('loginForm');
      const btn = document.getElementById('loginBtn');
      const alertContainer = document.getElementById('alert-container');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertContainer.innerHTML = '';
        btn.disabled = true;
        btn.innerHTML = 'Signing In...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          // Mock login if server is down, otherwise uncomment next lines:
          // const response = await fetchAPI('/auth/login', {
          //   method: 'POST',
          //   body: JSON.stringify({ email, password })
          // });
          
          // MOCK IMPLEMENTATION START (remove this section when API is ready)
          let response = { token: 'mock-jwt-token', user: { name: 'Demo User', role: 'Student', email: email } };
          if(email.includes('admin')) response.user.role = 'Admin';
          if(email.includes('employee')) response.user.role = 'Employee';
          await new Promise(r => setTimeout(r, 600)); // fake delay
          // MOCK IMPLEMENTATION END

          setAuth(response.token, response.user);
          window.location.href = 'dashboard.html';
        } catch (err) {
          alertContainer.innerHTML = buildAlertUI(err.message, 'error');
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }
      });
    });
  </script>
</body>
</html>
